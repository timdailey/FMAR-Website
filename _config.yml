title: Fix My AI Rank
description: AI visibility analysis for B2B marketers
url: "https://fixmyairank.com"
baseurl: ""

permalink: /blog/:slug/

plugins:
  - jekyll-paginate
  - jekyll-redirect-from
  - jekyll-sitemap

paginate: 10
paginate_path: "/blog/page:num/"

collections:
  posts:
    output: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

theme: null

markdown: kramdown
highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitattributes
  - vendor
  - .bundle
  - node_modules
