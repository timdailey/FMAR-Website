---
layout: default
---
<div class="page-hero">
  <div class="container--narrow">
    <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="page-lead">{{ page.description }}</p>{% endif %}
  </div>
</div>
<div class="page-content">
  <div class="container--narrow post-content prose">
    {{ content }}
  </div>
</div>
