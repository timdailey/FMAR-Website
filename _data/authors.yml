tim_dailey:
  name: Tim Dailey
  title: Co-founder, Fix My AI Rank
  bio: Tim has spent more than 20 years at the intersection of digital marketing, web strategy, and search. His recent focus is Generative Engine Optimization — understanding why some brands get cited by AI models and helping companies build the structured, authoritative content that gets named when a language model answers a buyer's question.
  photo: /assets/images/tim-dailey.webp
  linkedin: https://www.linkedin.com/in/timothy-dailey/

frank_days:
  name: Frank Days
  title: Co-founder, Fix My AI Rank
  bio: Frank has spent more than 20 years helping fast-growing technology companies turn marketing into a growth engine — most recently as CMO at Aerospike and SVP of Marketing at EDB, where he helped scale the company from $25M to $100M ARR. At Fix My AI Rank, he works with companies to make sure their expertise gets in front of AI systems when it matters most.
  photo: /assets/images/frank-days.webp
  linkedin: https://www.linkedin.com/in/frankdays/
